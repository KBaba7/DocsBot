services:
  - type: web
    name: docsbot
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: STORAGE_BACKEND
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: documents
      - key: SUPABASE_STORAGE_PREFIX
        value: docsqa
      - key: WEB_SEARCH_PROVIDER
        value: duckduckgo
      - key: TAVILY_API_KEY
        sync: false

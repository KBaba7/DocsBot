app = "docsbot-kbaba7"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  STORAGE_BACKEND = "supabase"
  WEB_SEARCH_PROVIDER = "tavily"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
